name: Refresh AI Visibility Reports

on:
  schedule:
    - cron: '0 8 * * 1,4'   # Monday + Thursday, 8am UTC
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout ai-visibility repo
        uses: actions/checkout@v4

      - name: Clone build tools
        run: git clone https://github.com/filipelinsduarte/ai-visibility-report build-tools

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: build-tools/requirements.txt

      - name: Install dependencies
        run: pip install -r build-tools/requirements.txt

      - name: Build all clients
        env:
          AIPEEKABOO_API_KEY: ${{ secrets.AIPEEKABOO_API_KEY }}
        run: python .github/scripts/build_all.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "auto-refresh: $(date +%Y-%m-%d)" && git push)

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Report refresh failed — ${new Date().toISOString().slice(0,10)}`,
              body: `Scheduled refresh failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['build-failure']
            })
